<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ismail Mihad | Professional Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- স্বাগতম পেজ -->
    <div id="welcome-page">
        <div class="welcome-container">
            <h2>স্বাগতম! আপনার তথ্য দিন</h2>
            <form id="info-form">
                <input type="text" id="username" placeholder="আপনার নাম" required>
                <input type="text" id="useraddress" placeholder="আপনার ঠিকানা" required>
                <input type="tel" id="userphone" placeholder="মোবাইল নাম্বার" required>
                <button type="submit" class="primary-btn">জমা দিন</button>
            </form>
            <div class="or-divider">বা / OR</div>
            <button id="continue-btn" class="continue-btn">চালিয়ে যান &rarr;</button>
        </div>
    </div>

    <!-- মূল সাইট -->
    <div id="main-site">
        <header>
            <div class="navbar">
                <div class="logo" id="logo-home">MihadX</div>
                <nav>
                    <a href="#" class="nav-btn active" data-target="home">হোম</a>
                    <a href="#" class="nav-btn" data-target="skills">আমার দক্ষতা</a>
                    <a href="#" class="nav-btn" data-target="works">আমার কাজগুলো</a>
                    <a href="#" class="nav-btn" data-target="shop">শপ</a>
                    <a href="#" class="nav-btn" data-target="order">অর্ডার</a>
                </nav>
            </div>
        </header>

        <main class="content-area">
            <section id="home" class="page-section">
                <!-- হোম কন্টেন্ট -->
            </section>

            <section id="skills" class="page-section">
                <!-- স্কিল কন্টেন্ট -->
            </section>

            <section id="works" class="page-section">
                <!-- ওয়ার্কস কন্টেন্ট -->
            </section>

            <!-- শপ সেকশন: এখানে শার্ট, প্যান্ট এবং গেঞ্জি একসাথে থাকবে -->
            <section id="shop" class="page-section">
                <div class="section-header">
                    <h2>আমাদের শপ কালেকশন</h2>
                </div>
                <div class="grid-layout">
                    <!-- শার্ট -->
                    <div class="product-card">
                        <h3>প্রিমিয়াম ক্যাজুয়াল কটন শার্ট</h3>
                        <p class="price">৳ ৫৫০</p>
                        <button class="buy-now" data-item="প্রিমিয়াম ক্যাজুয়াল কটন শার্ট">অর্ডার করুন</button>
                    </div>
                    <!-- প্যান্ট -->
                    <div class="product-card">
                        <h3>ক্যাজুয়াল স্টাইলিশ গ্যাবার্ডিন প্যান্ট</h3>
                        <p class="price">৳ ৬৫০</p>
                        <button class="buy-now" data-item="ক্যাজুয়াল স্টাইলিশ গ্যাবার্ডিন প্যান্ট">অর্ডার করুন</button>
                    </div>
                    <!-- গেঞ্জি (শপের ভিতরেই চলে এসেছে) -->
                    <div class="product-card premium-card">
                        <div class="hot-badge">HOT PRODUCT</div>
                        <h3>মানি-এরা ড্রপ শোল্ডার টি-শার্ট</h3>
                        <p class="price">৳ ৪৯০</p>
                        <button class="buy-now" data-item="মানি-এরা ড্রপ শোল্ডার টি-শার্ট">অর্ডার করুন</button>
                    </div>
                </div>
            </section>

            <section id="order" class="page-section">
                <div class="section-header">
                    <h2>সরাসরি অর্ডার করুন</h2>
                </div>
                <div class="order-box">
                    <a href="https://wa.me/8801576502490" target="_blank" class="whatsapp-btn">💬 হোয়াটসঅ্যাপে অর্ডার করুন</a>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
