<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>MihadX | Professional Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ওয়েলকাম ও রেজিস্ট্রেশন পেজ -->
    <div id="welcome-page">
        <div class="welcome-container">
            <h2>স্বাগতম! আপনার তথ্য দিন</h2>
            <form id="info-form">
                <input type="text" id="name" placeholder="আপনার নাম" required>
                <input type="text" id="address" placeholder="আপনার ঠিকানা" required>
                <input type="text" id="phone" placeholder="মোবাইল নাম্বার" required>
                <button type="submit" class="primary-btn">জমা দিন</button>
            </form>
            <div class="or-divider">বা</div>
            <button id="continue-btn" class="continue-btn">চালিয়ে যান →</button>
        </div>
    </div>

    <!-- মেইন ওয়েবসাইট -->
    <div id="main-site" style="display:none;">
        <header>
            <div class="navbar">
                <div class="logo">MihadX</div>
                <nav>
                    <a href="#" class="nav-btn" data-target="home">হোম</a>
                    <a href="#" class="nav-btn" data-target="skills">আমার দক্ষতা</a>
                    <a href="#" class="nav-btn" data-target="works">আমার কাজগুলো</a>
                    <a href="#" class="nav-btn" data-target="shop">শপ</a>
                    <a href="#" class="nav-btn" data-target="order">অর্ডার</a>
                </nav>
            </div>
        </header>
        
        <main class="content-area">
            <!-- শপ সেকশন (এখানে শার্ট, প্যান্ট, গেঞ্জি সব থাকবে) -->
            <section id="shop" class="page-section">
                <h2>আমাদের শপ</h2>
                <div class="product-grid">
                    <div class="card"><h3>শার্ট</h3><button class="whatsapp-order" data-item="শার্ট">অর্ডার করুন</button></div>
                    <div class="card"><h3>প্যান্ট</h3><button class="whatsapp-order" data-item="প্যান্ট">অর্ডার করুন</button></div>
                    <div class="card"><h3>গেঞ্জি</h3><button class="whatsapp-order" data-item="গেঞ্জি">অর্ডার করুন</button></div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
