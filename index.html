<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>MihadX - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcome-page">
        <h2>স্বাগতম! আপনার তথ্য দিন</h2>
        <form id="info-form">
            <input type="text" placeholder="আপনার নাম" required>
            <button type="submit">জমা দিন</button>
        </form>
        <button id="continue-btn">চালিয়ে যান →</button>
    </div>

    <div id="main-site" style="display:none;">
        <header>
            <div class="logo">MihadX</div>
            <nav>
                <a href="#" class="nav-btn" data-target="home">হোম</a>
                <a href="#" class="nav-btn" data-target="skills">আমার দক্ষতা</a>
                <a href="#" class="nav-btn" data-target="works">আমার কাজগুলো</a>
                <a href="#" class="nav-btn" data-target="shop">শপ</a>
                <a href="#" class="nav-btn" data-target="order">অর্ডার</a>
            </nav>
        </header>

        <section id="shop" class="page-section">
            <h2>আমাদের শপ কালেকশন</h2>
            <div class="product-grid">
                <div class="product">শার্ট</div>
                <div class="product">প্যান্ট</div>
                <div class="product">গেঞ্জি</div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
