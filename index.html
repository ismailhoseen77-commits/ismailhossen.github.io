<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ismail Mihad | Professional Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls">
        <button id="theme-toggle">🌙 মোড</button>
        <button id="lang-toggle">🌐 EN/BN</button>
    </div>

    <div id="welcome-page">
        <div class="welcome-container">
            <h2 data-bn="স্বাগতম! আপনার তথ্য দিন" data-en="Welcome! Enter your details">স্বাগতম! আপনার তথ্য দিন</h2>
            <form id="info-form">
                <input type="text" id="username" placeholder="আপনার নাম" required>
                <input type="text" id="useraddress" placeholder="আপনার ঠিকানা" required>
                <input type="tel" id="userphone" placeholder="মোবাইল নাম্বার" required>
                <button type="submit" class="primary-btn">জমা দিন</button>
            </form>
            <button id="continue-btn" class="continue-btn">চালিয়ে যান &rarr;</button>
        </div>
    </div>

    <div id="main-site" style="display:none;">
        <header>
            <div class="navbar">
                <div class="logo" id="logo-home">MihadX</div>
                <nav>
                    <a href="#" class="nav-btn active" data-target="home" data-bn="হোম" data-en="Home">হোম</a>
                    <a href="#" class="nav-btn" data-target="skills" data-bn="আমার দক্ষতা" data-en="Skills">আমার দক্ষতা</a>
                    <a href="#" class="nav-btn" data-target="works" data-bn="আমার কাজগুলো" data-en="Works">আমার কাজগুলো</a>
                    <a href="#" class="nav-btn" data-target="shop" data-bn="শপ" data-en="Shop">শপ</a>
                    <a href="#" class="nav-btn" data-target="order" data-bn="অর্ডার" data-en="Order">অর্ডার</a>
                </nav>
            </div>
        </header>

        <main class="content-area">
            <section id="home" class="page-section">
                <h1>হাই, আমি ইসমাইল মিহাদ</h1>
                <p>অ্যাডভান্সড এক্সেল অটোমেশন ও ডিজিটাল এন্টারপ্রেনার।</p>
            </section>
            
            <section id="skills" class="page-section" style="display:none;">
                <h2>আমার দক্ষতা</h2>
                <div class="grid-layout">
                    <div class="card"><h3>Excel Automation</h3><button class="buy-now" data-item="Excel সার্ভিস">অর্ডার করুন</button></div>
                    <div class="card"><h3>Word Document</h3><button class="buy-now" data-item="Word সার্ভিস">অর্ডার করুন</button></div>
                    <div class="card"><h3>Data Entry</h3><button class="buy-now" data-item="Data Entry সার্ভিস">অর্ডার করুন</button></div>
                </div>
            </section>

            <section id="works" class="page-section" style="display:none;"><h2>আমার কাজগুলো</h2></section>

            <section id="shop" class="page-section" style="display:none;">
                <h2>শপ</h2>
                <div class="grid-layout">
                    <div class="card"><h3>শার্ট</h3><button class="buy-now" data-item="শার্ট">অর্ডার</button></div>
                    <div class="card"><h3>প্যান্ট</h3><button class="buy-now" data-item="প্যান্ট">অর্ডার</button></div>
                    <div class="card"><h3>টি-শার্ট</h3><button class="buy-now" data-item="টি-শার্ট">অর্ডার</button></div>
                </div>
            </section>

            <section id="order" class="page-section" style="display:none;">
                <h2>সরাসরি অর্ডার করুন</h2>
                <button id="main-whatsapp-btn" class="whatsapp-btn">💬 হোয়াটসঅ্যাপে অর্ডার করুন</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
